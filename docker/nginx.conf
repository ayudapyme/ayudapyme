server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # mTLS — pedir certificado del cliente (optional = no bloquear si no tiene)
    ssl_client_certificate /etc/nginx/certs/fnmt-ca.crt;
    ssl_verify_client optional;
    ssl_verify_depth 3;

    # Pasar datos del certificado al backend vía headers
    location /api/whoami {
        if ($ssl_client_verify = SUCCESS) {
            add_header Content-Type application/json;
            return 200 '{"verified":true,"dn":"$ssl_client_s_dn","nif":"$ssl_client_s_dn","nombre":"$ssl_client_s_dn"}';
        }
        add_header Content-Type application/json;
        return 401 '{"verified":false,"error":"No certificate"}';
    }

    # SPA — todas las rutas van a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache de assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
